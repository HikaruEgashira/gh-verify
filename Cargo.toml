[workspace]
members = ["crates/core", "crates/cli", "crates/verif", "tools/gen-docs"]
resolver = "2"

[workspace.package]
version = "0.4.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
gh-verify-core = { path = "crates/core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "2"
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
tokio = { version = "1", features = ["full"] }
tree-sitter = "0.24"
tree-sitter-typescript = "0.23"
tree-sitter-python = "0.23"
tree-sitter-go = "0.23"
colored = "3"
regex = "1"
creusot-std = { git = "https://github.com/creusot-rs/creusot", package = "creusot-std" }

[profile.release]
lto = true
strip = true
codegen-units = 1
