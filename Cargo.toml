[workspace]
members = ["crates/cli"]
resolver = "2"

[workspace.package]
version = "0.8.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
libverify-core = { git = "https://github.com/HikaruEgashira/libverify" }
libverify-github = { git = "https://github.com/HikaruEgashira/libverify" }
libverify-output = { git = "https://github.com/HikaruEgashira/libverify" }
libverify-policy = { git = "https://github.com/HikaruEgashira/libverify" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
colored = "3"

[profile.release]
lto = true
strip = true
codegen-units = 1
