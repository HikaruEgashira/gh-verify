[workspace]
members = ["crates/core", "crates/cli", "crates/verif", "tools/gen-docs"]
resolver = "2"

[workspace.package]
version = "0.6.0"
edition = "2024"
license = "MIT"

[workspace.dependencies]
gh-verify-core = { path = "crates/core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
colored = "3"
regorus = "0.9"
tempfile = "3"
creusot-std = { git = "https://github.com/creusot-rs/creusot", package = "creusot-std" }

[profile.release]
lto = true
strip = true
codegen-units = 1
