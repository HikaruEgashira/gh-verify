name: "gh-verify"
description: >
  GitHub SDLC health checker.
  Verifies pull requests and releases against supply chain security and compliance controls.
branding:
  icon: "shield"
  color: "blue"

inputs:
  command:
    description: "Subcommand: pr or release"
    required: true
  argument:
    description: "PR number (for pr) or tag/range (for release)"
    required: true
  repo:
    description: "Repository in OWNER/REPO format (defaults to current repo)"
    required: false
    default: "${{ github.repository }}"
  format:
    description: "Output format: human, json, or sarif"
    required: false
    default: "json"
  policy:
    description: "Policy preset (default, oss, aiops, soc1, soc2) or path to .rego file"
    required: false
    default: ""
  slsa-level:
    description: "SLSA level target: source-l{N}-build-l{M} (e.g. source-l3-build-l2)"
    required: false
    default: ""
  only-failures:
    description: "Only show controls with fail decision in output"
    required: false
    default: "false"
  version:
    description: "gh-verify version to install. Empty = latest."
    required: false
    default: ""
  upload-sarif:
    description: "Upload SARIF results to GitHub Code Scanning (auto-enabled when format=sarif)"
    required: false
    default: "false"

outputs:
  result:
    description: "Overall gate result: pass, review, or fail"
    value: ${{ steps.parse.outputs.result }}
  pass-count:
    description: "Number of controls with pass decision"
    value: ${{ steps.parse.outputs.pass-count }}
  review-count:
    description: "Number of controls with review decision"
    value: ${{ steps.parse.outputs.review-count }}
  fail-count:
    description: "Number of controls with fail decision"
    value: ${{ steps.parse.outputs.fail-count }}
  sarif-file:
    description: "Path to SARIF output file (set when SARIF is generated)"
    value: ${{ steps.sarif.outputs.sarif-file }}

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_FORMAT: ${{ inputs.format }}
      run: |
        if [[ "$INPUT_COMMAND" != "pr" && "$INPUT_COMMAND" != "release" ]]; then
          echo "::error::Invalid command '$INPUT_COMMAND'. Must be 'pr' or 'release'."
          exit 1
        fi
        if [[ "$INPUT_FORMAT" != "human" && "$INPUT_FORMAT" != "json" && "$INPUT_FORMAT" != "sarif" ]]; then
          echo "::error::Invalid format '$INPUT_FORMAT'. Must be 'human', 'json', or 'sarif'."
          exit 1
        fi

    - name: Install gh-verify
      id: install
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        if [ -n "$INPUT_VERSION" ]; then
          gh extension install HikaruEgashira/gh-verify --pin "$INPUT_VERSION"
        else
          gh extension install HikaruEgashira/gh-verify
        fi

    - name: Run gh-verify
      id: verify
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_ARGUMENT: ${{ inputs.argument }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_SLSA_LEVEL: ${{ inputs.slsa-level }}
      run: |
        ARGS=("$INPUT_COMMAND" "$INPUT_ARGUMENT" --repo "$INPUT_REPO" --format json)
        if [ -n "$INPUT_POLICY" ]; then
          ARGS+=(--policy "$INPUT_POLICY")
        fi
        if [ -n "$INPUT_SLSA_LEVEL" ]; then
          ARGS+=(--slsa-level "$INPUT_SLSA_LEVEL")
        fi

        set +e
        JSON_OUTPUT=$(gh verify "${ARGS[@]}" 2>"$RUNNER_TEMP/gh-verify-stderr.log")
        EXIT_CODE=$?
        set -e

        echo "$JSON_OUTPUT" > "$RUNNER_TEMP/gh-verify-output.json"
        echo "exit-code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

        if [ -s "$RUNNER_TEMP/gh-verify-stderr.log" ]; then
          while IFS= read -r line; do
            echo "::warning::$line"
          done < "$RUNNER_TEMP/gh-verify-stderr.log"
        fi

    - name: Parse results
      id: parse
      shell: bash
      env:
        INPUT_ONLY_FAILURES: ${{ inputs.only-failures }}
      run: |
        if ! jq empty "$RUNNER_TEMP/gh-verify-output.json" 2>/dev/null; then
          echo "::error::gh-verify produced invalid JSON output"
          cat "$RUNNER_TEMP/gh-verify-output.json"
          exit 1
        fi

        JSON_OUTPUT=$(cat "$RUNNER_TEMP/gh-verify-output.json")

        PASS=$(echo "$JSON_OUTPUT" | jq '[.outcomes[] | select(.decision=="pass")] | length')
        REVIEW=$(echo "$JSON_OUTPUT" | jq '[.outcomes[] | select(.decision=="review")] | length')
        FAIL=$(echo "$JSON_OUTPUT" | jq '[.outcomes[] | select(.decision=="fail")] | length')

        if [ "$FAIL" -gt 0 ]; then
          RESULT="fail"
        elif [ "$REVIEW" -gt 0 ]; then
          RESULT="review"
        else
          RESULT="pass"
        fi

        echo "result=$RESULT" >> "$GITHUB_OUTPUT"
        echo "pass-count=$PASS" >> "$GITHUB_OUTPUT"
        echo "review-count=$REVIEW" >> "$GITHUB_OUTPUT"
        echo "fail-count=$FAIL" >> "$GITHUB_OUTPUT"

        # Filter JSON to only failures if requested
        if [ "$INPUT_ONLY_FAILURES" = "true" ]; then
          jq '.outcomes |= [.[] | select(.decision=="fail")]' \
            "$RUNNER_TEMP/gh-verify-output.json" > "$RUNNER_TEMP/gh-verify-filtered.json"
          mv "$RUNNER_TEMP/gh-verify-filtered.json" "$RUNNER_TEMP/gh-verify-output.json"
        fi

    - name: Run gh-verify
      id: format-output
      if: inputs.format != 'json'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_ARGUMENT: ${{ inputs.argument }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_SLSA_LEVEL: ${{ inputs.slsa-level }}
      run: |
        ARGS=("$INPUT_COMMAND" "$INPUT_ARGUMENT" --repo "$INPUT_REPO" --format "$INPUT_FORMAT")
        if [ -n "$INPUT_POLICY" ]; then
          ARGS+=(--policy "$INPUT_POLICY")
        fi
        if [ -n "$INPUT_SLSA_LEVEL" ]; then
          ARGS+=(--slsa-level "$INPUT_SLSA_LEVEL")
        fi

        gh verify "${ARGS[@]}" > "$RUNNER_TEMP/gh-verify-formatted-output" 2>/dev/null || true

    - name: Write step summary
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_ARGUMENT: ${{ inputs.argument }}
        RESULT: ${{ steps.parse.outputs.result }}
        PASS: ${{ steps.parse.outputs.pass-count }}
        REVIEW: ${{ steps.parse.outputs.review-count }}
        FAIL: ${{ steps.parse.outputs.fail-count }}
      run: |
        {
          echo "## gh-verify: ${INPUT_COMMAND} ${INPUT_ARGUMENT}"
          echo ""
          echo "| Result | Count |"
          echo "|--------|-------|"
          echo "| Pass   | ${PASS} |"
          echo "| Review | ${REVIEW} |"
          echo "| Fail   | ${FAIL} |"
          echo ""
          echo "<details><summary>Full JSON output</summary>"
          echo ""
          echo '```json'
          jq . "$RUNNER_TEMP/gh-verify-output.json"
          echo '```'
          echo "</details>"
        } >> "$GITHUB_STEP_SUMMARY"

        cat "$RUNNER_TEMP/gh-verify-output.json"

    - name: Prepare SARIF
      id: sarif
      if: inputs.format == 'sarif' || inputs.upload-sarif == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_ARGUMENT: ${{ inputs.argument }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_SLSA_LEVEL: ${{ inputs.slsa-level }}
      run: |
        # If format is already sarif, reuse the formatted output
        if [ "$INPUT_FORMAT" = "sarif" ] && [ -f "$RUNNER_TEMP/gh-verify-formatted-output" ]; then
          cp "$RUNNER_TEMP/gh-verify-formatted-output" "$RUNNER_TEMP/gh-verify.sarif"
        else
          ARGS=("$INPUT_COMMAND" "$INPUT_ARGUMENT" --repo "$INPUT_REPO" --format sarif)
          if [ -n "$INPUT_POLICY" ]; then
            ARGS+=(--policy "$INPUT_POLICY")
          fi
          if [ -n "$INPUT_SLSA_LEVEL" ]; then
            ARGS+=(--slsa-level "$INPUT_SLSA_LEVEL")
          fi
          gh verify "${ARGS[@]}" > "$RUNNER_TEMP/gh-verify.sarif" 2>/dev/null
        fi

        if ! jq empty "$RUNNER_TEMP/gh-verify.sarif" 2>/dev/null; then
          echo "::error::gh-verify produced invalid SARIF output"
          exit 1
        fi
        echo "sarif-file=$RUNNER_TEMP/gh-verify.sarif" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF to Code Scanning
      if: (inputs.format == 'sarif' || inputs.upload-sarif == 'true') && steps.sarif.outputs.sarif-file != ''
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.sarif.outputs.sarif-file }}

    - name: Exit on failure
      if: steps.parse.outputs.result == 'fail'
      shell: bash
      run: exit 1
