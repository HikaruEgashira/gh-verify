name: "ghverify: check-pr"
description: >
  Run gh-verify SDLC checks on a pull request and report results.
  Fails if any rule returns an error-level finding.

inputs:
  pr-number:
    description: "Pull request number to verify"
    required: true
  repo:
    description: "Repository in OWNER/REPO format (defaults to current repo)"
    required: false
    default: "${{ github.repository }}"
  format:
    description: "Output format: human or json"
    required: false
    default: "human"
  rule:
    description: "Run only a specific rule ID (empty = all rules)"
    required: false
    default: ""

outputs:
  result:
    description: "Overall result: pass, warning, or error"
    value: ${{ steps.verify.outputs.result }}

runs:
  using: "composite"
  steps:
    - name: Install gh-verify
      shell: bash
      run: |
        gh extension install HikaruEgashira/gh-verify 2>/dev/null || \
          gh extension upgrade gh-verify 2>/dev/null || true

    - name: Run gh-verify
      id: verify
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_RULE: ${{ inputs.rule }}
      run: |
        ARGS="$INPUT_PR_NUMBER --repo $INPUT_REPO --format $INPUT_FORMAT"
        if [ -n "$INPUT_RULE" ]; then
          ARGS="$ARGS --rule $INPUT_RULE"
        fi

        set +e
        OUTPUT=$(gh verify pr $ARGS 2>&1)
        EXIT_CODE=$?
        set -e

        echo "$OUTPUT"

        if [ $EXIT_CODE -eq 0 ]; then
          # Check for warnings in output
          if echo "$OUTPUT" | grep -q "warning:"; then
            echo "result=warning" >> "$GITHUB_OUTPUT"
          else
            echo "result=pass" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "result=error" >> "$GITHUB_OUTPUT"
          exit 1
        fi
