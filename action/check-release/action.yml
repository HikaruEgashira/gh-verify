name: "ghverify: check-release (DEPRECATED)"
description: >
  DEPRECATED: Use HikaruEgashira/gh-verify@v0.4 with command=release instead.
  This wrapper exists only for backwards compatibility and will be removed in v0.5.

inputs:
  tag:
    description: "Release tag or tag range (e.g. v1.0.0 or v0.9.0..v1.0.0)"
    required: true
  repo:
    description: "Repository in OWNER/REPO format (defaults to current repo)"
    required: false
    default: "${{ github.repository }}"
  format:
    description: "Output format: human, json, or sarif"
    required: false
    default: "human"
  policy:
    description: "Path to custom OPA policy file (.rego) for gate decisions"
    required: false
    default: ""
  version:
    description: "gh-verify version to install (e.g. v0.4.0). Empty = latest."
    required: false
    default: ""

outputs:
  result:
    description: "Overall result: pass, review, or fail"
    value: ${{ steps.run.outputs.result }}
  pass-count:
    description: "Number of controls with pass decision"
    value: ${{ steps.run.outputs.pass-count }}
  review-count:
    description: "Number of controls with review decision"
    value: ${{ steps.run.outputs.review-count }}
  fail-count:
    description: "Number of controls with fail decision"
    value: ${{ steps.run.outputs.fail-count }}

runs:
  using: "composite"
  steps:
    - name: Deprecation notice
      shell: bash
      run: echo "::warning::ghverify/action/check-release is deprecated. Use HikaruEgashira/gh-verify@v0.4 with command=release instead."

    - uses: HikaruEgashira/gh-verify@main
      id: run
      with:
        command: release
        argument: ${{ inputs.tag }}
        repo: ${{ inputs.repo }}
        format: ${{ inputs.format }}
        policy: ${{ inputs.policy }}
        version: ${{ inputs.version }}
