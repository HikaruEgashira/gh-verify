name: "ghverify: check-release"
description: >
  Run gh-verify SDLC checks on a release and report results.
  Fails if any rule returns an error-level finding.

inputs:
  tag:
    description: "Release tag or tag range (e.g. v1.0.0 or v0.9.0..v1.0.0)"
    required: true
  repo:
    description: "Repository in OWNER/REPO format (defaults to current repo)"
    required: false
    default: "${{ github.repository }}"
  format:
    description: "Output format: human or json"
    required: false
    default: "human"
  policy:
    description: "Path to custom OPA policy file (.rego) for gate decisions"
    required: false
    default: ""
  version:
    description: "gh-verify version to install (e.g. v0.3.0). Empty = latest."
    required: false
    default: ""

outputs:
  result:
    description: "Overall result: pass, warning, or error"
    value: ${{ steps.verify.outputs.result }}

runs:
  using: "composite"
  steps:
    - name: Install gh-verify
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        if gh extension list | grep -q gh-verify; then
          gh extension upgrade gh-verify
        else
          if [ -n "$INPUT_VERSION" ]; then
            gh extension install HikaruEgashira/gh-verify --pin "$INPUT_VERSION"
          else
            gh extension install HikaruEgashira/gh-verify
          fi
        fi

    - name: Run gh-verify
      id: verify
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_POLICY: ${{ inputs.policy }}
      run: |
        POLICY_FLAG=""
        if [ -n "$INPUT_POLICY" ]; then
          POLICY_FLAG="--policy $INPUT_POLICY"
        fi
        set +e
        OUTPUT=$(gh verify release "$INPUT_TAG" --repo "$INPUT_REPO" --format "$INPUT_FORMAT" $POLICY_FLAG 2>&1)
        EXIT_CODE=$?
        set -e

        echo "$OUTPUT"

        {
          echo "## gh-verify: Release ${INPUT_TAG}"
          echo '```'
          echo "$OUTPUT"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

        if [ $EXIT_CODE -eq 0 ]; then
          if echo "$OUTPUT" | grep -q "warning:"; then
            echo "result=warning" >> "$GITHUB_OUTPUT"
          else
            echo "result=pass" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "result=error" >> "$GITHUB_OUTPUT"
          exit 1
        fi
