name: verify-repo

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1" # Mon 03:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./
        id: verify
        with:
          command: repo
          format: json
          policy: oss
          audit: "true"
