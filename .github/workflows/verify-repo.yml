name: verify-repo
on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1" # Mon 03:17 UTC
  workflow_dispatch:
permissions:
  contents: read
  security-events: read
jobs:
  verify:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: ./
        id: verify
        timeout-minutes: 5
        with:
          command: repo
          format: json
          policy: oss
          audit: "true"
