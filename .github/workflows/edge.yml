name: edge

on:
  push:
    branches:
      - main

concurrency:
  group: edge-release
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: gh-verify-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: gh-verify-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: gh-verify-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: gh-verify-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: gh-verify-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          export GH_VERIFY_VERSION_SUFFIX="dev+${SHORT_SHA}"
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p gh-verify
          else
            cargo build --release --target ${{ matrix.target }} -p gh-verify
          fi
        shell: bash

      - name: Package binary
        run: |
          mkdir -p dist
          if [[ "${{ matrix.asset }}" == *.exe ]]; then
            cp "target/${{ matrix.target }}/release/gh-verify.exe" "dist/${{ matrix.asset }}"
          else
            cp "target/${{ matrix.target }}/release/gh-verify" "dist/${{ matrix.asset }}"
          fi
        shell: bash

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: Attest build provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Compute tag
        id: tag
        run: echo "name=v0.0.0-dev.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@1853d73993c8ca1b2c9c1a7fede39682d0ab5c2a # v2.5.3
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          target_commitish: ${{ github.sha }}
          name: "Edge ${{ steps.tag.outputs.name }}"
          body: |
            Rolling build from `main` at ${{ github.sha }}.

            ```
            gh extension install HikaruEgashira/gh-verify --pin ${{ steps.tag.outputs.name }}
            ```
          files: dist/*
          prerelease: true
          make_latest: false

      - name: Prune old edge releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --json tagName,isPrerelease --jq '.[] | select(.isPrerelease) | select(.tagName | startswith("v0.0.0-dev.")) | .tagName' \
            | sort -r | tail -n +4 | while read -r tag; do
              gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
            done
