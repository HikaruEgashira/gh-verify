name: edge

on:
  push:
    branches:
      - main

concurrency:
  group: edge-release
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Push edge tag via deploy key
        env:
          DEPLOY_KEY: ${{ secrets.EDGE_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          TAG="v0.0.0-dev.${GITHUB_SHA::7}"
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"

      - name: Prune old edge releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release list --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease) | select(.tagName | startswith("v0.0.0-dev.")) | .tagName' \
            | sort -r | tail -n +4 | while read -r tag; do
              gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
            done
