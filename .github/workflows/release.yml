name: release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  pull-requests: read
  id-token: write
  attestations: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: gh-verify-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: gh-verify-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: gh-verify-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: gh-verify-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: gh-verify-windows-amd64.exe
    timeout-minutes: 5
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        timeout-minutes: 5
        with:
          toolchain: "1.88.0"
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        timeout-minutes: 5
        run: cargo install cross --version 0.2.5 --locked
      - name: Build
        timeout-minutes: 5
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p gh-verify
          else
            cargo build --release --target ${{ matrix.target }} -p gh-verify
          fi
        shell: bash
      - name: Package binary
        timeout-minutes: 5
        run: |
          mkdir -p dist
          if [[ "${{ matrix.asset }}" == *.exe ]]; then
            cp "target/${{ matrix.target }}/release/gh-verify.exe" "dist/${{ matrix.asset }}"
          else
            cp "target/${{ matrix.target }}/release/gh-verify" "dist/${{ matrix.asset }}"
          fi
        shell: bash
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: 5
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
  release:
    needs: build
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 5
        with:
          path: ${{ runner.temp }}/artifacts
          merge-multiple: true
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        timeout-minutes: 5
        with:
          artifact-name: gh-verify-sbom.cdx.json
          output-file: ${{ runner.temp }}/artifacts/gh-verify-sbom.cdx.json
          format: cyclonedx-json
      - name: Attest build provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        timeout-minutes: 5
        with:
          subject-path: ${{ runner.temp }}/artifacts/*
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        timeout-minutes: 5
        with:
          files: ${{ runner.temp }}/artifacts/*
          prerelease: false
          make_latest: true
